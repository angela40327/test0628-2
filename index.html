<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>躲避小遊戲</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f0f4f8; font-family: 'Inter', sans-serif; }
        #game-container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        canvas { background: white; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); cursor: none; }
        .ui-overlay { position: absolute; text-align: center; pointer-events: none; background: rgba(255, 255, 255, 0.98); padding: 2rem; border-radius: 1rem; width: 90%; max-width: 450px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="ui" class="ui-overlay">
            <h1 id="msg" class="text-3xl font-bold text-gray-800 mb-4">躲避紅方塊</h1>
            
            <div id="nameInputGroup" class="hidden mb-6">
                <input type="text" id="playerName" placeholder="輸入你的名字" maxlength="10" class="border p-2 rounded w-full mb-2 pointer-events-auto">
                <button id="saveScoreBtn" class="pointer-events-auto bg-green-500 text-white px-6 py-2 rounded-full w-full hover:bg-green-600 transition">儲存成績</button>
            </div>

            <div id="aiAdviceContainer" class="hidden mb-6 p-4 bg-indigo-50 border border-indigo-200 rounded-lg">
                <p id="aiAdvice" class="text-sm text-indigo-800 italic">正在分析你的戰鬥表現...</p>
            </div>

            <div id="leaderboard" class="mb-6 hidden">
                <h2 class="text-lg font-semibold text-gray-700 mb-2">全球最高分排行榜</h2>
                <ul id="scoreList" class="text-gray-600 text-left"></ul>
            </div>

            <div class="flex flex-col gap-2">
                <button id="startBtn" class="pointer-events-auto bg-blue-500 hover:bg-blue-600 text-white px-8 py-3 rounded-full text-xl shadow-lg transition">開始遊戲</button>
                <button id="aiBtn" class="hidden pointer-events-auto bg-purple-500 hover:bg-purple-600 text-white px-6 py-2 rounded-full shadow-lg transition">✨ 取得專家建議</button>
            </div>
        </div>
        <div id="scoreBoard" class="absolute top-5 left-5 text-2xl font-bold text-gray-600 hidden">分數: <span id="score">0</span></div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxsK1sHjnz1kCeLhhESN-k1rJdYlvP6_F8Q8qIenpnR-Vl1jnu5jpZCkXEVKSn2wUjUNQ/exec";
        const apiKey = ""; 

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const scoreBoard = document.getElementById('scoreBoard');
        const ui = document.getElementById('ui');
        const msg = document.getElementById('msg');
        const startBtn = document.getElementById('startBtn');
        const aiBtn = document.getElementById('aiBtn');
        const aiAdvice = document.getElementById('aiAdvice');
        const aiAdviceContainer = document.getElementById('aiAdviceContainer');
        const leaderboard = document.getElementById('leaderboard');
        const scoreList = document.getElementById('scoreList');
        const nameInputGroup = document.getElementById('nameInputGroup');
        const playerNameInput = document.getElementById('playerName');
        const saveScoreBtn = document.getElementById('saveScoreBtn');

        let isRunning = false;
        let score = 0;
        let speedMultiplier = 1;
        let player = { x: 0, y: 0, radius: 15 };
        let enemies = [];
        let keys = { ArrowLeft: false, ArrowRight: false, ArrowUp: false, ArrowDown: false };

        // GAS 排行榜邏輯
        async function saveHighScore(name, score) {
            try {
                await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ name, score })
                });
            } catch (e) { console.error("無法連線至排行榜伺服器"); }
        }

// ... 請找到原本的 renderLeaderboard 並替換為以下內容 ...

        async function renderLeaderboard() {
            try {
                // 加入時間戳記避免瀏覽器讀取舊的快取資料
                const response = await fetch(GAS_URL + "?t=" + Date.now(), {
                    method: 'GET',
                    mode: 'cors'
                });
                const scores = await response.json();
                
                if (Array.isArray(scores) && scores.length > 0) {
                    leaderboard.classList.remove('hidden');
                    scoreList.innerHTML = scores.map((s, i) => 
                        `<li class="py-1 border-b">${i + 1}. ${s.name}: ${s.score} 分</li>`
                    ).join('');
                }
            } catch(e) {
                console.error("無法取得排行榜資料:", e);
                // 如果失敗，在 UI 上給予一點提示
                scoreList.innerHTML = `<li class="text-red-500 text-sm">暫無法連線排行榜</li>`;
                leaderboard.classList.remove('hidden');
            }
        }
        
        // ... 同時確保頁面載入時會自動執行一次 ...
        window.onload = renderLeaderboard;

        async function getAiAdvice() {
            aiAdviceContainer.classList.remove('hidden');
            aiAdvice.innerText = "Gemini AI 正在分析你的操作...";
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `玩家在躲避遊戲中得到了 ${score} 分。請用輕鬆幽默的口吻給玩家一個簡單的遊戲建議，繁體中文。` }] }] })
                });
                const data = await response.json();
                aiAdvice.innerText = data.candidates[0].content.parts[0].text;
            } catch (e) { aiAdvice.innerText = "目前 AI 建議連線異常，再玩一場試試看吧！"; }
        }

        // 遊戲核心邏輯
        function resize() {
            canvas.width = Math.min(window.innerWidth * 0.9, 600);
            canvas.height = Math.min(window.innerHeight * 0.8, 800);
            player.x = canvas.width / 2; player.y = canvas.height / 2;
        }
        window.addEventListener('resize', resize);
        resize();

        window.addEventListener('keydown', (e) => keys[e.key] = true);
        window.addEventListener('keyup', (e) => keys[e.key] = false);

        function spawnEnemy() {
            const size = 20 + Math.random() * 20;
            const side = Math.floor(Math.random() * 4);
            let x, y, vx, vy;
            const speed = (2 + Math.random() * 2) * speedMultiplier;
            if (side === 0) { x = -size; y = Math.random() * canvas.height; vx = speed; vy = (Math.random() - 0.5) * 2; } 
            else if (side === 1) { x = canvas.width + size; y = Math.random() * canvas.height; vx = -speed; vy = (Math.random() - 0.5) * 2; }
            else if (side === 2) { x = Math.random() * canvas.width; y = -size; vx = (Math.random() - 0.5) * 2; vy = speed; }
            else { x = Math.random() * canvas.width; y = canvas.height + size; vx = (Math.random() - 0.5) * 2; vy = -speed; }
            enemies.push({ x, y, vx, vy, size });
        }

        function update() {
            if (!isRunning) return;
            if (keys.ArrowLeft && player.x > player.radius) player.x -= 7;
            if (keys.ArrowRight && player.x < canvas.width - player.radius) player.x += 7;
            if (keys.ArrowUp && player.y > player.radius) player.y -= 7;
            if (keys.ArrowDown && player.y < canvas.height - player.radius) player.y += 7;

            enemies.forEach((en, index) => {
                en.x += en.vx; en.y += en.vy;
                const dx = player.x - (en.x + en.size / 2);
                const dy = player.y - (en.y + en.size / 2);
                if (Math.sqrt(dx * dx + dy * dy) < player.radius + en.size / 2 - 2) gameOver();
                if (en.x < -100 || en.x > canvas.width + 100 || en.y < -100 || en.y > canvas.height + 100) {
                    enemies.splice(index, 1);
                    score++; scoreEl.innerText = score; speedMultiplier += 0.02;
                }
            });
            if (Math.random() < 0.04) spawnEnemy();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#3b82f6'; ctx.beginPath(); ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#ef4444'; enemies.forEach(en => ctx.fillRect(en.x, en.y, en.size, en.size));
            requestAnimationFrame(update);
        }

        function gameOver() {
            isRunning = false;
            msg.innerText = '遊戲結束！分數: ' + score;
            ui.classList.remove('hidden');
            startBtn.classList.add('hidden');
            nameInputGroup.classList.remove('hidden');
            aiBtn.classList.remove('hidden');
            playerNameInput.focus();
            renderLeaderboard();
        }

        saveScoreBtn.onclick = () => {
            saveHighScore(playerNameInput.value.trim() || '無名氏', score);
            nameInputGroup.classList.add('hidden');
            startBtn.classList.remove('hidden');
            startBtn.innerText = '再試一次';
            renderLeaderboard();
        };

        aiBtn.onclick = getAiAdvice;
        startBtn.onclick = () => {
            score = 0; speedMultiplier = 1; enemies = []; scoreEl.innerText = '0';
            scoreBoard.classList.remove('hidden'); ui.classList.add('hidden');
            leaderboard.classList.add('hidden'); aiAdviceContainer.classList.add('hidden');
            isRunning = true; update();
        };
    </script>
</body>
</html>
